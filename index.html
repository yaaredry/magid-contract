<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חוזה שכירות – מרכז קהילתי מגיד</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #eef2f7;
      direction: rtl;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,.12);
      width: 100%;
      max-width: 680px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1a3e5c, #2471a3);
      color: #fff;
      padding: 28px 32px 22px;
      text-align: center;
    }
    .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .header p  { font-size: 13px; opacity: .8; }

    .progress-track { height: 4px; background: #dde3ea; }
    .progress-bar   { height: 4px; background: #2471a3; transition: width .35s ease; }

    .dots { display: flex; justify-content: center; gap: 10px; padding: 18px; }
    .dot  { width: 11px; height: 11px; border-radius: 50%; background: #cdd5de; transition: background .3s; }
    .dot.active { background: #2471a3; }
    .dot.done   { background: #27ae60; }

    .step { display: none; padding: 28px 32px 20px; }
    .step.active { display: block; }

    .step-title {
      font-size: 17px; font-weight: 700; color: #1a3e5c;
      margin-bottom: 22px; padding-bottom: 10px;
      border-bottom: 2px solid #eef2f7;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 13px; font-weight: 600;
      color: #444; margin-bottom: 5px;
    }
    .field .hint { font-size: 11px; color: #888; font-weight: 400; margin-right: 6px; }
    .field input, .field select {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid #cdd5de; border-radius: 8px;
      font-size: 15px; font-family: inherit;
      direction: rtl; color: #222;
      transition: border-color .2s;
    }
    .field input:focus, .field select:focus { outline: none; border-color: #2471a3; }

    .row { display: flex; gap: 14px; }
    .row .field { flex: 1; }

    .optional-label::after { content: ' (אופציונלי)'; font-weight:400; color:#999; font-size:11px; }

    .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .rooms-grid input { margin: 0; }

    .summary {
      background: #f5f8fc; border-radius: 10px;
      padding: 18px 20px; margin-bottom: 22px; font-size: 13.5px;
    }
    .summary-row {
      display: flex; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid #e8edf2;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .lbl { color: #666; }
    .summary-row .val { font-weight: 600; color: #222; text-align: left; max-width: 60%; }

    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 32px 20px;
      border-top: 1px solid #eef2f7;
      background: #f9fafc;
    }
    .step-label { font-size: 13px; color: #888; }

    .btn {
      padding: 10px 26px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all .2s; font-family: inherit;
    }
    .btn-back { background: #fff; color: #2471a3; border: 2px solid #2471a3; }
    .btn-back:hover { background: #eaf3fb; }
    .btn-next { background: #2471a3; color: #fff; }
    .btn-next:hover { background: #1a5c8a; }

    .btn-download {
      display: block; width: 100%; padding: 14px; margin-top: 8px;
      color: #fff; font-size: 16px;
      border-radius: 10px; border: none; cursor: pointer;
      font-family: inherit; font-weight: 700; transition: background .2s;
    }
    .btn-download.docx { background: #27ae60; }
    .btn-download.docx:hover    { background: #1f9150; }
    .btn-download.docx:disabled { background: #8ec8a6; cursor: wait; }

    #status-msg { text-align:center; font-size:13px; color:#888; margin-top:10px; min-height:18px; }
    #status-msg.err { color:#c0392b; }

    .btn-demo {
      display: block; width: 100%; padding: 8px; margin-bottom: 16px;
      background: #f0f0f0; color: #666; font-size: 13px;
      border-radius: 8px; border: 1px dashed #bbb; cursor: pointer;
      font-family: inherit; transition: background .2s;
    }
    .btn-demo:hover { background: #e4e4e4; color: #333; }
  </style>
</head>
<body>
<div class="card">

  <div class="header">
    <h1>מרכז קהילתי מגיד</h1>
    <p>מילוי חוזה לשימוש בשטחי המרכז</p>
  </div>

  <div class="progress-track">
    <div class="progress-bar" id="progress-bar" style="width:20%"></div>
  </div>

  <div class="dots">
    <div class="dot active" id="dot-1"></div>
    <div class="dot"        id="dot-2"></div>
    <div class="dot"        id="dot-3"></div>
    <div class="dot"        id="dot-4"></div>
    <div class="dot"        id="dot-5"></div>
  </div>

  <!-- ── STEP 1: Date & Renter ── -->
  <div class="step active" id="step-1">
    <div class="step-title">תאריך החוזה ופרטי המשתמש</div>
    <button class="btn-demo" onclick="fillDemo()">✏️ מלא פרטי דוגמה</button>

    <div class="row">
      <div class="field">
        <label>ביום</label>
        <input type="number" id="f-day" min="1" max="31" placeholder="15" />
      </div>
      <div class="field">
        <label>לחודש</label>
        <input type="text" id="f-month" placeholder="ינואר" />
      </div>
    </div>

    <div class="field">
      <label>שם מלא / שם ארגון (לבין)</label>
      <input type="text" id="f-name" placeholder="ישראל ישראלי / עמותת הדוגמא" />
    </div>

    <div class="row">
      <div class="field">
        <label>טלפון</label>
        <input type="tel" id="f-phone" placeholder="050-0000000" />
      </div>
      <div class="field">
        <label class="optional-label">פקס</label>
        <input type="tel" id="f-fax" placeholder="03-0000000" />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>ח.פ / ת.ז</label>
        <input type="text" id="f-id" placeholder="123456789" />
      </div>
      <div class="field">
        <label>דואר אלקטרוני</label>
        <input type="email" id="f-email" placeholder="example@email.com" />
      </div>
    </div>
  </div>

  <!-- ── STEP 2: Rental Details ── -->
  <div class="step" id="step-2">
    <div class="step-title">פרטי השכירות</div>

    <div class="field">
      <label>שם המתקן / אולם (לשכור)</label>
      <input type="text" id="f-room" placeholder="אולם כינוסים, חדר 3..." />
    </div>

    <div class="field">
      <label>סוג החדרים / מגרשים</label>
      <input type="text" id="f-type-of-rooms" placeholder="חדרים, מגרש ספורט..." />
    </div>

    <div class="row">
      <div class="field">
        <label>מטרת השימוש עבור</label>
        <input type="text" id="f-purpose" placeholder="אירוע, קורס, כנס..." />
      </div>
      <div class="field">
        <label>לצורך (פעילות)</label>
        <input type="text" id="f-activity" placeholder="הרצאה, ריקוד, ספורט..." />
      </div>
    </div>

    <div class="field">
      <label>בין התאריכים <span class="hint">(טווח שלם, למשל: 01/01/2026 – 31/12/2026)</span></label>
      <input type="text" id="f-startDate" placeholder="01/01/2026 – 31/12/2026" />
    </div>

    <div class="field">
      <label>בין הימים</label>
      <input type="text" id="f-days" placeholder="ראשון–חמישי / כל יום שישי" />
    </div>

    <div class="field">
      <label>בין השעות <span class="hint">(מ–עד, למשל: 09:00–17:00)</span></label>
      <input type="text" id="f-startTime" placeholder="09:00–17:00" />
    </div>

    <div class="field">
      <label class="optional-label">תאריכים נוספים (עמוד 2)</label>
      <input type="text" id="f-more-dates" placeholder="תאריכים נוספים אם יש..." />
    </div>
  </div>

  <!-- ── STEP 3: Payment ── -->
  <div class="step" id="step-3">
    <div class="step-title">תמורה ותשלום</div>

    <div class="field">
      <label>מינימום שעות שימוש מחויבות</label>
      <input type="number" id="f-num-hours-used" min="1" placeholder="4" />
    </div>

    <div class="field">
      <label>דמי שימוש – בסך של (₪)</label>
      <input type="number" id="f-fee" min="0" placeholder="2000" />
    </div>

    <div class="field">
      <label>תעריף שעתי נוסף – סך של (₪) <span class="hint">סעיף 5.3</span></label>
      <input type="number" id="f-fee-5-3" min="0" placeholder="150" />
    </div>
  </div>

  <!-- ── STEP 4: Optional Rooms ── -->
  <div class="step" id="step-4">
    <div class="step-title">חדרים כלולים בשכירות <span class="hint">(אופציונלי – עד 7)</span></div>

    <div class="rooms-grid">
      <input type="text" id="f-room1" placeholder="חדר 1" />
      <input type="text" id="f-room2" placeholder="חדר 2" />
      <input type="text" id="f-room3" placeholder="חדר 3" />
      <input type="text" id="f-room4" placeholder="חדר 4" />
      <input type="text" id="f-room5" placeholder="חדר 5" />
      <input type="text" id="f-room6" placeholder="חדר 6" />
      <input type="text" id="f-room7" placeholder="חדר 7" />
    </div>
  </div>

  <!-- ── STEP 5: Summary & Download ── -->
  <div class="step" id="step-5">
    <div class="step-title">סיכום ופקת חוזה</div>
    <div class="summary" id="summary"></div>
    <button class="btn-download docx" id="btn-docx" onclick="generatePDF()">
      ⬇&nbsp; הורד את החוזה (PDF)
    </button>
    <div id="status-msg"></div>
  </div>

  <div class="nav">
    <button class="btn btn-back" id="btn-back" style="visibility:hidden" onclick="prevStep()">→ חזור</button>
    <span class="step-label" id="step-label">שלב 1 מתוך 5</span>
    <button class="btn btn-next" id="btn-next" onclick="nextStep()">הבא ←</button>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
// WIZARD
// ═══════════════════════════════════════════════════
let current = 1;
const TOTAL = 5;

function updateUI() {
  for (let i = 1; i <= TOTAL; i++) {
    document.getElementById(`step-${i}`).classList.toggle('active', i === current);
    const dot = document.getElementById(`dot-${i}`);
    dot.className = 'dot' + (i < current ? ' done' : i === current ? ' active' : '');
  }
  document.getElementById('progress-bar').style.width = (current / TOTAL * 100) + '%';
  document.getElementById('step-label').textContent = `שלב ${current} מתוך ${TOTAL}`;
  document.getElementById('btn-back').style.visibility = current > 1 ? 'visible' : 'hidden';
  document.getElementById('btn-next').style.display    = current < TOTAL ? 'inline-block' : 'none';
}

function nextStep() { if (current < TOTAL) { current++; if (current === TOTAL) buildSummary(); updateUI(); } }
function prevStep() { if (current > 1)     { current--; updateUI(); } }

function fillDemo() {
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
  set('f-day',           '15');
  set('f-month',         'ינואר');
  set('f-name',          'ישראל ישראלי');
  set('f-phone',         '050-1234567');
  set('f-fax',           '03-9999999');
  set('f-id',            '123456789');
  set('f-email',         'israel@example.com');
  set('f-room',          'אולם א');
  set('f-type-of-rooms', 'אולמות');
  set('f-purpose',       'חוג ריקוד');
  set('f-activity',      'הרצאה');
  set('f-startDate',     '01/01/2026 – 31/12/2026');
  set('f-days',          'ראשון–חמישי');
  set('f-startTime',     '09:00–17:00');
  set('f-more-dates',    '');
  set('f-num-hours-used','4');
  set('f-fee',           '2000');
  set('f-fee-5-3',       '150');
  set('f-room1',         'חדר 1');
  set('f-room2',         'חדר 2');
  // jump straight to the summary step
  current = TOTAL;
  buildSummary();
  updateUI();
}

function getData() {
  const v = id => (document.getElementById(id)?.value || '').trim();
  return {
    day:             v('f-day'),
    month:           v('f-month'),
    name:            v('f-name'),
    phone:           v('f-phone'),
    fax:             v('f-fax'),
    id:              v('f-id'),
    email:           v('f-email'),
    room:            v('f-room'),
    'type-of-rooms': v('f-type-of-rooms'),
    purpose:         v('f-purpose'),
    activity:        v('f-activity'),
    startDate:       v('f-startDate'),
    days:            v('f-days'),
    startTime:       v('f-startTime'),
    'more-dates':    v('f-more-dates'),
    'num-hours-used':v('f-num-hours-used'),
    fee:             v('f-fee'),
    'fee-5.3':       v('f-fee-5-3'),
    room1: v('f-room1'), room2: v('f-room2'), room3: v('f-room3'),
    room4: v('f-room4'), room5: v('f-room5'), room6: v('f-room6'), room7: v('f-room7'),
  };
}

function buildSummary() {
  const d = getData();
  const rows = [
    ['תאריך חוזה',        d.day && d.month ? `${d.day} ל${d.month}` : '—'],
    ['שם המשתמש',         d.name     || '—'],
    ['טלפון',             d.phone    || '—'],
    ['פקס',               d.fax      || '—'],
    ['ח.פ / ת.ז',         d.id       || '—'],
    ['דואר אלקטרוני',     d.email    || '—'],
    ['מתקן',              d.room     || '—'],
    ['סוג חדרים',         d['type-of-rooms'] || '—'],
    ['מטרת שימוש',        d.purpose  || '—'],
    ['פעילות',            d.activity || '—'],
    ['תאריכים',           d.startDate|| '—'],
    ['ימים',              d.days     || '—'],
    ['שעות',              d.startTime|| '—'],
    ['תאריכים נוספים',    d['more-dates'] || '—'],
    ['מינ׳ שעות',         d['num-hours-used'] || '—'],
    ['דמי שימוש',         d.fee      ? `₪${d.fee}`        : '—'],
    ['תעריף שעתי',        d['fee-5.3'] ? `₪${d['fee-5.3']}` : '—'],
    ['חדרים',             [d.room1,d.room2,d.room3,d.room4,d.room5,d.room6,d.room7].filter(Boolean).join(', ') || '—'],
  ];
  document.getElementById('summary').innerHTML = rows.map(([l,v]) =>
    `<div class="summary-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`
  ).join('');
}

// ═══════════════════════════════════════════════════
// PDF GENERATION
// ═══════════════════════════════════════════════════
//
// contract.pdf is a real fillable PDF form (AcroForm text fields).
// We fill each field's value directly via pdf-lib — no image conversion,
// no DOCX, no per-OS font/layout drift. This map connects our wizard's
// data keys to the actual field names embedded in the PDF.

const PDF_FIELD_MAP = {
  day: 'text_9fesm',
  month: 'text_10huco',
  name: 'text_11time',
  phone: 'text_12tpzw',
  id: 'text_13nnzf',
  email: 'text_14rwiy',
  room: 'text_15zlth',
  activity: 'text_17tnvd',
  purpose: 'text_16qolh',
  startTime: 'text_20oeig',
  days: 'text_19ojsm',
  startDate: 'text_18pvmq',
  'num-hours-used': 'text_21xmik',
  fee: 'text_22nqtk',
  'fee-5.3': 'text_23amre',
  room1: 'text_1buwf',
  room2: 'text_3famp',
  room3: 'text_4ybcd',
  room4: 'text_5fodf',
  room5: 'text_6vcpi',
  room6: 'text_7opcn',
  room7: 'text_8kcnk',
  // fax, type-of-rooms, and more-dates have no fillable field in the
  // current template (decorative dashes only) — to be added later.
};

// 0-indexed page number for each field (page 1 fields, then page 2 fields).
const PDF_FIELD_PAGE = {
  day: 0, month: 0, name: 0, phone: 0, id: 0, email: 0, room: 0,
  activity: 0, purpose: 0, startTime: 0, days: 0, startDate: 0,
  room1: 0, room2: 0, room3: 0, room4: 0, room5: 0, room6: 0, room7: 0,
  'num-hours-used': 1, fee: 1, 'fee-5.3': 1,
};

function setBusy(busy) {
  document.getElementById('btn-docx').disabled = busy;
}

// Real-world PDF viewers (Acrobat, macOS Preview, Chrome/Edge) apply the
// Unicode Bidi Algorithm themselves when laying out text, so drawing plain
// logical-order text renders correctly in them. (Manually pre-reversing
// here made Hebrew look mirrored in those viewers — it was only "correct"
// in poppler, which does not apply bidi and was used for local testing.)
function toVisualOrder(str) {
  return str;
}

async function generatePDF() {
  const msg = document.getElementById('status-msg');
  setBusy(true);
  msg.className = '';
  msg.textContent = 'טוען תבנית חוזה...';

  try {
    const { PDFDocument, rgb } = PDFLib;

    const [pdfBytes, fontBytes] = await Promise.all([
      fetch('contract.pdf').then(r => { if (!r.ok) throw new Error('לא ניתן לטעון את contract.pdf'); return r.arrayBuffer(); }),
      fetch('fonts/NotoSansHebrew-Regular.ttf').then(r => { if (!r.ok) throw new Error('לא ניתן לטעון את הפונט'); return r.arrayBuffer(); }),
    ]);

    msg.textContent = 'ממלא פרטים...';
    const pdfDoc = await PDFDocument.load(pdfBytes);
    pdfDoc.registerFontkit(fontkit);
    const hebrewFont = await pdfDoc.embedFont(fontBytes);

    const form = pdfDoc.getForm();
    const pages = pdfDoc.getPages();
    const d = getData();

    // Draw each value directly on the page at the field's own rectangle,
    // instead of relying on the AcroForm field's own appearance-generation
    // (which does not reliably shrink text to fit narrow boxes). We compute
    // our own font size to fit, then flatten the (still-empty) form fields
    // afterward so only our drawn text remains — a clean, non-interactive
    // final contract instead of highlighted fillable boxes.
    for (const [key, fieldName] of Object.entries(PDF_FIELD_MAP)) {
      const value = d[key];
      if (!value) continue;
      try {
        const field = form.getTextField(fieldName);
        const widget = field.acroField.getWidgets()[0];
        const rect = widget.getRectangle();
        const page = pages[PDF_FIELD_PAGE[key] ?? 0];
        const visualValue = toVisualOrder(value);

        const maxSize = 10, minSize = 4, padding = 4;
        const naturalWidth = hebrewFont.widthOfTextAtSize(visualValue, maxSize);
        const fontSize = naturalWidth > rect.width - padding
          ? Math.max(minSize, (rect.width - padding) / naturalWidth * maxSize)
          : maxSize;

        const textWidth = hebrewFont.widthOfTextAtSize(visualValue, fontSize);
        const x = rect.x + Math.max(0, (rect.width - textWidth) / 2); // centered
        const y = rect.y + (rect.height - fontSize) / 2 + fontSize * 0.15;

        page.drawText(visualValue, { x, y, size: fontSize, font: hebrewFont, color: rgb(0, 0, 0) });
      } catch (e) {
        console.warn('Field not found or failed to fill:', fieldName, e);
      }
    }

    // Remove the interactive field widgets now that their values are baked
    // directly into the page — leaves a clean, non-fillable final PDF
    // instead of highlighted form boxes (including any left unfilled).
    for (const name of Object.values(PDF_FIELD_MAP)) {
      try { form.removeField(form.getField(name)); } catch (e) { /* already gone */ }
    }

    msg.textContent = 'מכין להורדה...';
    const out = await pdfDoc.save();
    const blob = new Blob([out], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const _d = new Date(); const today = `${_d.getDate()}-${_d.getMonth()+1}-${_d.getFullYear()}`;
    a.href = url; a.download = `חוזה_${d.name || 'ממולא'}_${today}.pdf`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 8000);
    msg.textContent = '✓ הקובץ הורד בהצלחה';

  } catch (err) {
    msg.className = 'err';
    msg.textContent = '⚠ שגיאה: ' + (err.message || String(err));
    console.error(err);
  } finally {
    setBusy(false);
  }
}
</script>
</body>
</html>
