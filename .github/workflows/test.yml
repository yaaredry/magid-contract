name: Contract DOCX tests

on:
  push:
    paths:
      - contract.docx
      - index.html
      - tests/**
      - package.json
  pull_request:
    paths:
      - contract.docx
      - index.html
      - tests/**
      - package.json

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run contract tests
        run: npm test

      - name: Upload filled sample DOCX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-sample-docx
          path: tests/output_sample.docx
          retention-days: 14
