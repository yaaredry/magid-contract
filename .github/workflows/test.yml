name: Contract PDF tests

on:
  push:
    paths:
      - contract.pdf
      - fonts/**
      - index.html
      - tests/**
      - package.json
  pull_request:
    paths:
      - contract.pdf
      - fonts/**
      - index.html
      - tests/**
      - package.json

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install pypdf

      - name: Run contract tests
        run: npm test
